<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delivery Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@600&display=swap" rel="stylesheet">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Delivery">

<link rel="apple-touch-icon" href="https://i.ibb.co/8n64MGC5/IMG-1728.jpg">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:'Reem Kufi',sans-serif;
background:#fff8e1;
margin:0;
text-align:center;
direction:rtl;
transition:0.5s;
}

header{
background:#ffeb3b;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
}

.logo img{
width:120px;
margin:15px;
border-radius:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.main button{
width:90%;
padding:18px;
margin:10px;
font-size:20px;
background:#ffeb3b;
border:none;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.2s;
}

.main button:active{
transform:scale(0.95);
}

.section{
display:none;
padding:20px;
}

input{
width:90%;
padding:14px;
margin-top:12px;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
text-align:center;
}

.big{
padding:15px 30px;
font-size:22px;
margin-top:20px;
background:#4CAF50;
color:white;
border:none;
border-radius:12px;
}

.dangerBtn{
background:#e53935;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
font-size:18px;
}

.priceButtons button{
padding:10px 20px;
margin:5px;
border:none;
background:#ffeb3b;
border-radius:8px;
font-size:18px;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
font-size:16px;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#ffeb3b;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:5px 8px;
border-radius:6px;
}

/* الوضع الليلي */

.night{
background:#0f172a;
color:white;
}

.night header{
background:#1e293b;
}

.night .main button{
background:#334155;
color:white;
}

.night table th{
background:#334155;
}

.glow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:radial-gradient(circle at 50% 0%,rgba(255,255,200,0.25),transparent 60%);
}

</style>

</head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<body>

<header>

<button onclick="home()">🏠</button>

<div>

<button class="dangerBtn" onclick="danger()">⚠️ خطر</button>

</div>

</header>

<div class="logo">
<img src="https://i.ibb.co/8n64MGC5/IMG-1728.jpg">
</div>

<div style="font-size:20px;margin:10px">
أرباح اليوم: <span id="todayMoney">0</span> ₪
</div>

<div class="main">

<button onclick="startOrder()">إضافة طلبية</button>

<button onclick="ready()">جاهز للتوصيل</button>

<button onclick="openSheet()">ورقة الطلبات</button>

  <button onclick="openFinance()">📊 أرباح الشهر</button>

</div>

<!-- الطلب -->

<div id="order1" class="section">

<input id="customerName" placeholder="اسم الزبون">

<input id="shop" placeholder="اسم المحل">

<input id="orderText" placeholder="الطلب">

<h3>الوقت المتوقع (بالدقائق)</h3>

<div class="priceButtons">
<p>من:</p>
<button onclick="setFrom(5)">5</button>
<button onclick="setFrom(10)">10</button>
<button onclick="setFrom(15)">15</button>
<button onclick="setFrom(20)">20</button>
<button onclick="setFrom(25)">25</button>
<button onclick="setFrom(30)">30</button>
<button onclick="setFrom(35)">35</button>
<button onclick="setFrom(40)">40</button>
<button onclick="setFrom(45)">45</button>
<button onclick="setFrom(50)">50</button>
</div>

<div class="priceButtons" id="toButtons">
<p>إلى:</p>
<button onclick="setTo(5)">5</button>
<button onclick="setTo(10)">10</button>
<button onclick="setTo(15)">15</button>
<button onclick="setTo(20)">20</button>
<button onclick="setTo(25)">25</button>
<button onclick="setTo(30)">30</button>
<button onclick="setTo(35)">35</button>
<button onclick="setTo(40)">40</button>
<button onclick="setTo(45)">45</button>
<button onclick="setTo(50)">50</button>
</div>

<input id="timeFrom" placeholder="من" readonly>
<input id="timeTo" placeholder="إلى" readonly>

<h3>سعر التوصيل</h3>

<div class="priceButtons">

<button onclick="setPrice(10)">10</button>
<button onclick="setPrice(15)">15</button>
<button onclick="setPrice(20)">20</button>
<button onclick="setPrice(30)">30</button>
<button onclick="setPrice(40)">40</button>

</div>

<input id="deliveryPrice" placeholder="السعر المختار" readonly>

<br>

<button class="big" onclick="createOrder()">إرسال</button>

</div>

<!-- الجدول -->

<div id="sheet" class="section">

<button onclick="downloadTable()">تحميل صورة الجدول</button>

<div id="tableArea">

<table>

<thead>

<tr>
<th>الزبون</th>
<th>الطلب</th>
<th>السعر</th>
<th>حذف</th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

  <div id="finance" class="section">

<h2>📊 أرباح الشهر</h2>

<table>
<thead>
<tr>
<th>اليوم</th>
<th>المجموع</th>
<th>ربح اليوم</th>
</tr>
</thead>

<tbody id="financeTable"></tbody>

</table>

<canvas id="chart" height="200"></canvas>

</div>

<script>


  let fromTime = null
let toTime = null

function setFrom(v){
fromTime = v
document.getElementById("timeFrom").value = v + " دقيقة"

// فلترة أزرار "إلى"
let buttons = document.querySelectorAll("#toButtons button")
buttons.forEach(btn=>{
if(Number(btn.innerText) <= v){
btn.style.display="none"
}else{
btn.style.display="inline-block"
}
})
}

function setTo(v){
toTime = v
document.getElementById("timeTo").value = v + " دقيقة"
}

  function getTimeRange(){

if(fromTime === null || toTime === null) return ""

let now = new Date()

let fromDate = new Date(now.getTime() + fromTime*60000)
let toDate = new Date(now.getTime() + toTime*60000)

function format(d){
return d.getHours().toString().padStart(2,"0") + ":" +
d.getMinutes().toString().padStart(2,"0")
}

return `\n⏱️ الوقت المتوقع للوصول: ${format(fromDate)} - ${format(toDate)}`
}

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

function home(){
document.querySelectorAll(".section").forEach(e=>e.style.display="none")
}

function startOrder(){
home()
document.getElementById("order1").style.display="block"
}

function setPrice(p){
document.getElementById("deliveryPrice").value=p
}

function createOrder(){

let name=document.getElementById("customerName").value
let shop=document.getElementById("shop").value
let order=document.getElementById("orderText").value
let phone=document.getElementById("phone").value
let price=document.getElementById("deliveryPrice").value



let timeText = getTimeRange()

let message=`Delivery سريع 💨
عزيزي: ${name}
المحل: ${shop}
طلبك هو: ${order}
سعر التوصيل: ${price} شيكل
${timeText}

{الطلب حالياً في مرحلة التحضير}.`



navigator.clipboard.writeText(message)

window.open(`tel:${phone}`, '_self')

orders.push({
name:name,
order:order+" / "+shop,
price:price,
date:Date.now()
})

localStorage.setItem("orders",JSON.stringify(orders))

updateTable()

}

function openSheet(){

home()

document.getElementById("sheet").style.display="block"

updateTable()

}

function updateMoney(){

let today=new Date().toDateString()

let total=0

orders.forEach(o=>{

let d=new Date(o.date).toDateString()

if(d==today){

total+=Number(o.price)

}

})

document.getElementById("todayMoney").innerText=total

}

function updateTable(){

let table=document.getElementById("table")

table.innerHTML=""

orders.forEach((o,i)=>{

table.innerHTML+=`
<tr>
<td>${o.name}</td>
<td>${o.order}</td>
<td>${o.price}</td>
<td><button class="deleteBtn" onclick="deleteOrder(${i})">X</button></td>
</tr>
`
})

updateMoney()

}

function deleteOrder(i){

orders.splice(i,1)

localStorage.setItem("orders",JSON.stringify(orders))

updateTable()

}

function ready(){

let text=`✨تم استلام طلبك من المحل
الطلب في طريقه اليك 🛵`

navigator.clipboard.writeText(text)

window.open("whatsapp://send")

}

function danger(){

let text=`⚠️ بسبب الوضع الامني في المنطقة من الممكن ان تتأخر طلبيتك بضعة دقائق نتمنى ان تكونو سالمين.`

navigator.clipboard.writeText(text)

window.open("whatsapp://send")

}

function downloadTable(){

html2canvas(document.getElementById("tableArea")).then(canvas=>{

let link=document.createElement("a")

link.download="orders.png"

link.href=canvas.toDataURL()

link.click()

})

}

updateTable()

/* الوضع الليلي */

let hour=new Date().getHours()

if(hour>=19 || hour<=6){

document.body.classList.add("night")

let glow=document.createElement("div")

glow.className="glow"

document.body.appendChild(glow)

}

  let finance = JSON.parse(localStorage.getItem("finance") || "[]")

function openFinance(){
home()
document.getElementById("finance").style.display="block"
renderFinance()
drawChart()
}

function renderFinance(){

let table=document.getElementById("financeTable")
table.innerHTML=""

for(let i=0;i<30;i++){

let total=finance[i] || ""

let prev=finance[i-1] || 0

let profit = total ? (total - prev) : ""

table.innerHTML+=`
<tr>
<td>يوم ${i+1}</td>
<td><input value="${total}" onchange="saveFinance(${i},this.value)"></td>
<td>${profit}</td>
</tr>
`

}

}

function saveFinance(i,value){

finance[i]=Number(value)

localStorage.setItem("finance",JSON.stringify(finance))

renderFinance()
drawChart()

}

let chartInstance = null;

function drawChart(){

let profits=[]

for(let i=0;i<30;i++){

let total=finance[i] || 0
let prev=finance[i-1] || 0

profits.push(total - prev)

}

let ctx=document.getElementById("chart").getContext("2d")

// حذف الرسم القديم قبل إنشاء جديد
if(chartInstance){
chartInstance.destroy()
}

chartInstance = new Chart(ctx,{
type:"bar",
data:{
labels:profits.map((_,i)=>"يوم "+(i+1)),
datasets:[{
label:"أرباح يومية",
data:profits
}]
},
options:{
responsive:true,
scales:{
y:{
beginAtZero:true,
max:800
}
}
}
})

}

</script>

</body>
</html>
