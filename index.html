<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delivery Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@600&display=swap" rel="stylesheet">

<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="https://i.ibb.co/8n64MGC5/IMG-1728.jpg">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:'Reem Kufi',sans-serif;
background:#fff8e1;
margin:0;
text-align:center;
direction:rtl;
transition:0.5s;
}

header{
background:#ffeb3b;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
}

.logo img{
width:120px;
margin:15px;
border-radius:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.main button{
width:90%;
padding:18px;
margin:10px;
font-size:20px;
background:#ffeb3b;
border:none;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.2s;
}

.main button:active{
transform:scale(0.95);
}

.section{
display:none;
padding:20px;
}

input{
width:90%;
padding:14px;
margin-top:12px;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
text-align:center;
}

.big{
padding:15px 30px;
font-size:22px;
margin-top:20px;
background:#4CAF50;
color:white;
border:none;
border-radius:12px;
}

.dangerBtn{
background:#e53935;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
font-size:18px;
}

.priceButtons button{
padding:10px 20px;
margin:5px;
border:none;
background:#ffeb3b;
border-radius:8px;
font-size:18px;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
font-size:16px;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#ffeb3b;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:5px 8px;
border-radius:6px;
}

/* الوضع الليلي */

.night{
background:#0f172a;
color:white;
}

.night header{
background:#1e293b;
}

.night .main button{
background:#334155;
color:white;
}

.night table th{
background:#334155;
}

.glow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:radial-gradient(circle at 50% 0%,rgba(255,255,200,0.25),transparent 60%);
}

  .timeButtons button{
padding:10px 15px;
margin:5px;
border:none;
background:#ffeb3b;
border-radius:8px;
font-size:18px;
}

</style>

</head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
<body>

<header>

<button onclick="home()">🏠</button>

<div>

<button class="dangerBtn" onclick="danger()">⚠️ خطر</button>

</div>

</header>

<div class="logo">
<img src="https://i.ibb.co/8n64MGC5/IMG-1728.jpg">
</div>

<div style="font-size:20px;margin:10px">
أرباح اليوم: <span id="todayMoney">0</span> ₪
</div>

<div class="main">

<button onclick="startOrder()">إضافة طلبية</button>

<button onclick="ready()">جاهز للتوصيل</button>

<button onclick="openSheet()">ورقة الطلبات</button>

  <button onclick="openFinance()">📊 أرباح الشهر</button>

</div>

<!-- الطلب -->

<div id="order1" class="section">

<input id="customerName" placeholder="اسم الزبون">

<input id="shop" placeholder="اسم المحل">

<input id="orderText" placeholder="الطلب">

<div class="timeButtons">

<button onclick="selectTime(5)">5</button>
<button onclick="selectTime(10)">10</button>
<button onclick="selectTime(15)">15</button>
<button onclick="selectTime(20)">20</button>
<button onclick="selectTime(25)">25</button>
<button onclick="selectTime(30)">30</button>
<button onclick="selectTime(35)">35</button>
<button onclick="selectTime(40)">40</button>
<button onclick="selectTime(45)">45</button>
<button onclick="selectTime(50)">50</button>

</div>

<div style="margin-top:10px;font-size:18px;">
من: <span id="fromDisplay">-</span> دقيقة |
إلى: <span id="toDisplay">-</span> دقيقة
</div>
<h3>سعر التوصيل</h3>

<div class="priceButtons">

<button onclick="setPrice(10)">10</button>
<button onclick="setPrice(15)">15</button>
<button onclick="setPrice(20)">20</button>
<button onclick="setPrice(30)">30</button>
<button onclick="setPrice(40)">40</button>

</div>

<input id="deliveryPrice" placeholder="السعر المختار" readonly>

<br>

<button class="big" onclick="createOrder()">إرسال</button>

</div>

<!-- الجدول -->

<div id="sheet" class="section">

<button onclick="downloadTable()">تحميل صورة الجدول</button>

<div id="tableArea">

<table>

<thead>

<tr>
<th>الزبون</th>
<th>الطلب</th>
<th>السعر</th>
<th>حذف</th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

  <div id="finance" class="section">

<h2>📊 أرباح الشهر</h2>

<table>
<thead>
<tr>
<th>اليوم</th>
<th>المجموع</th>
<th>ربح اليوم</th>
</tr>
</thead>

<tbody id="financeTable"></tbody>

</table>

<canvas id="chart" height="200"></canvas>

</div>

<script>

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

function home(){
document.querySelectorAll(".section").forEach(e=>e.style.display="none")
}

function startOrder(){
home()
document.getElementById("order1").style.display="block"
}

function setPrice(p){
document.getElementById("deliveryPrice").value=p
}

  let fromTimeValue = null
let toTimeValue = null

function selectTime(value){

// أول ضغطة = من
if(fromTimeValue === null){
fromTimeValue = value
document.getElementById("fromDisplay").innerText = value
return
}

// ثاني ضغطة = إلى
if(toTimeValue === null){
toTimeValue = value

// تأكد أن "إلى" أكبر من "من"
if(toTimeValue < fromTimeValue){
let temp = fromTimeValue
fromTimeValue = toTimeValue
toTimeValue = temp
}

document.getElementById("toDisplay").innerText = toTimeValue
return
}

// إذا ضغط مرة ثالثة → إعادة تعيين
fromTimeValue = value
toTimeValue = null

document.getElementById("fromDisplay").innerText = value
document.getElementById("toDisplay").innerText = "-"
}

  function createOrder(){

let name = document.getElementById("customerName").value.trim()
let shop = document.getElementById("shop").value.trim()
let order = document.getElementById("orderText").value.trim()
let price = document.getElementById("deliveryPrice").value

let from = fromTimeValue
let to = toTimeValue
    
let timeText = ""

// فقط إذا الاثنين موجودين
if(from && to){

from = Number(from)
to = Number(to)

let now = new Date()

let fromTime = new Date(now.getTime() + from * 60000)
let toTime = new Date(now.getTime() + to * 60000)

let fromStr = fromTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
let toStr = toTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})

// نص نظيف بدون فراغات زيادة
timeText = `🛵 يصل بين: ${fromStr} - ${toStr}`
}

// بناء الرسالة
let message = `Delivery سريع 💨
عزيزي: ${name}
المحل: ${shop}
طلبك هو: ${order}
سعر التوصيل: ${price} شيكل`

// إضافة الوقت فقط إذا موجود
if(timeText){
message += `\n${timeText}`
}

// تكملة الرسالة
message += `\n\n{الطلب حالياً في مرحلة التحضير}.`

// نسخ الرسالة
navigator.clipboard.writeText(message)
alert("تم نسخ الرسالة 👍")

// حفظ الطلب
orders.push({
name: name,
order: order + " / " + shop,
price: price,
date: Date.now()
})

localStorage.setItem("orders", JSON.stringify(orders))

updateTable()

// تفريغ الحقول (تحسين مهم للسرعة)
document.getElementById("customerName").value = ""
document.getElementById("shop").value = ""
document.getElementById("orderText").value = ""
document.getElementById("timeFrom").value = ""
document.getElementById("timeTo").value = ""
document.getElementById("deliveryPrice").value = ""


    fromTimeValue = null
toTimeValue = null

document.getElementById("fromDisplay").innerText = "-"
document.getElementById("toDisplay").innerText = "-"
    
}

function updateTable(){

let table=document.getElementById("table")

table.innerHTML=""

orders.forEach((o,i)=>{

table.innerHTML+=`
<tr>
<td>${o.name}</td>
<td>${o.order}</td>
<td>${o.price}</td>
<td><button class="deleteBtn" onclick="deleteOrder(${i})">X</button></td>
</tr>
`
})

updateMoney()

}

function deleteOrder(i){

orders.splice(i,1)

localStorage.setItem("orders",JSON.stringify(orders))

updateTable()

}

function ready(){

let text=`✨تم استلام طلبك من المحل
الطلب في طريقه اليك 🛵`

navigator.clipboard.writeText(text)

window.open("whatsapp://send")

}

function danger(){

let text=`⚠️ بسبب الوضع الامني في المنطقة من الممكن ان تتأخر طلبيتك بضعة دقائق نتمنى ان تكونو سالمين.`

navigator.clipboard.writeText(text)

window.open("whatsapp://send")

}

function downloadTable(){

html2canvas(document.getElementById("tableArea")).then(canvas=>{

let link=document.createElement("a")

link.download="orders.png"

link.href=canvas.toDataURL()

link.click()

})

}

updateTable()

/* الوضع الليلي */

let hour=new Date().getHours()

if(hour>=19 || hour<=6){

document.body.classList.add("night")

let glow=document.createElement("div")

glow.className="glow"

document.body.appendChild(glow)

}

  let finance = JSON.parse(localStorage.getItem("finance") || "[]")

function openFinance(){
home()
document.getElementById("finance").style.display="block"
renderFinance()
drawChart()
}

function renderFinance(){

let table=document.getElementById("financeTable")
table.innerHTML=""

for(let i=0;i<30;i++){

let total=finance[i] || ""

let prev=finance[i-1] || 0

let profit = total ? (total - prev) : ""

table.innerHTML+=`
<tr>
<td>يوم ${i+1}</td>
<td><input value="${total}" onchange="saveFinance(${i},this.value)"></td>
<td>${profit}</td>
</tr>
`

}

}

function saveFinance(i,value){

finance[i]=Number(value)

localStorage.setItem("finance",JSON.stringify(finance))

renderFinance()
drawChart()

}

let chartInstance = null;

function drawChart(){

let profits=[]

for(let i=0;i<30;i++){

let total=finance[i] || 0
let prev=finance[i-1] || 0

profits.push(total - prev)

}

let ctx=document.getElementById("chart").getContext("2d")

// حذف الرسم القديم قبل إنشاء جديد
if(chartInstance){
chartInstance.destroy()
}

chartInstance = new Chart(ctx,{
type:"bar",
data:{
labels:profits.map((_,i)=>"يوم "+(i+1)),
datasets:[{
label:"أرباح يومية",
data:profits
}]
},
options:{
responsive:true,
scales:{
y:{
beginAtZero:true,
max:800
}
}
}
})

}

</script>

</body>
</html>
