<!DOCTYPE html>
<html lang="ar">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Delivery">
<link rel="apple-touch-icon" href="https://i.postimg.cc/C5gDy2Jr/sssdsd1.png">
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Tool</title>

<style>
  
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
}

input,button{
  font-size:16px; /* مهم جدًا للآيفون */
}

.box{
  width:90%;
  max-width:420px;
  background:#1a1a1a;
  padding:20px;
  border-radius:18px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
  text-align:center;
}

h2{
  color:#d4a000;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
  text-align:center;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#d4a000;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:active{
  transform:scale(0.97);
}

.profit{
  margin-top:15px;
  font-size:18px;
}

.smallBtn{
  width:auto;
  padding:5px 10px;
  margin-right:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>Delivery Tool</h2>

<input id="orderNumber" placeholder="رقم الطلب (اختياري)">
<input id="deliveryPrice" value="15">
<input id="totalPrice" placeholder="السعر شامل">
<input id="note" placeholder="ملاحظة (اختياري)">

<button onclick="createMessage()">نسخ الرسالة</button>

<div class="profit">
الأرباح اليومية: 
<span id="todayProfit">0</span> شيكل

<button class="smallBtn" onclick="resetProfit()">🔁</button>
</div>

</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders") || "[]")

function createMessage(){

let orderNumber = document.getElementById("orderNumber").value.trim()
let deliveryPrice = document.getElementById("deliveryPrice").value.trim()
let totalPrice = document.getElementById("totalPrice").value.trim()
let note = document.getElementById("note").value.trim()

let message = `Delivery سريع 💨\n\n`

if(orderNumber !== ""){
message += `رقم الطلب: ${orderNumber}\n\n`
}

message += `سعر التوصيل: ${deliveryPrice} شيكل\n`
message += `السعر شامل: ${totalPrice} شيكل\n\n`

if(note !== ""){
message += `ملاحظة: ${note}\n\n`
}

message += `شكراً لطلبك 🙏`

navigator.clipboard.writeText(message)
alert("تم النسخ 👍")

// حفظ الربح اليومي
orders.push({
price:Number(deliveryPrice || 0),
date:new Date().toDateString()
})

localStorage.setItem("orders", JSON.stringify(orders))

updateProfit()

// تفريغ
document.getElementById("orderNumber").value=""
document.getElementById("totalPrice").value=""
document.getElementById("note").value=""
}

function updateProfit(){

let today = new Date().toDateString()
let total = 0

orders.forEach(o=>{
if(o.date === today){
total += Number(o.price)
}
})

document.getElementById("todayProfit").innerText = total
}

function resetProfit(){

let today = new Date().toDateString()

orders = orders.filter(o => o.date !== today)

localStorage.setItem("orders", JSON.stringify(orders))

updateProfit()
}

updateProfit()

</script>

</body>
</html>
